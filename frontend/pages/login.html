<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="社区健康档案管理系统 - 用户登录">
  <title>登录 - 社区健康档案管理系统</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>社区健康档案</h1>
      <p class="subtitle">管理系统 · 请登录您的账户</p>
      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" name="username" placeholder="请输入用户名" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">登 录</button>
        <p class="form-error" id="loginError"></p>
      </form>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>

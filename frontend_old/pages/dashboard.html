<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="社区健康档案管理系统 - 数据概览">
  <title>仪表盘 - 社区健康档案管理系统</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-header">
        <h1>数据概览</h1>
        <p>系统运行情况一览</p>
      </div>

      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-icon"><script>document.write(window.Icons.residents)</script></div>
          <div class="stat-value" id="statResidents">--</div>
          <div class="stat-label">居民总数</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><script>document.write(window.Icons.building)</script></div>
          <div class="stat-value" id="statCommunities">--</div>
          <div class="stat-label">社区数量</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><script>document.write(window.Icons.stethoscope)</script></div>
          <div class="stat-value" id="statDiseases">--</div>
          <div class="stat-label">慢性病类型</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><script>document.write(window.Icons.shield)</script></div>
          <div class="stat-value" id="statStatus">在线</div>
          <div class="stat-label">系统状态</div>
        </div>
      </div>

      <div class="detail-panel">
        <h3><script>document.write(window.Icons.dashboard)</script> 快捷操作</h3>
        <div class="stats-grid" style="margin-bottom: 0;">
          <a href="/pages/residents.html" class="stat-card" style="cursor:pointer; text-decoration:none; color:inherit;">
            <div class="stat-icon"><script>document.write(window.Icons.plus)</script></div>
            <div class="stat-label">新增居民</div>
          </a>
          <a href="/pages/health.html" class="stat-card" style="cursor:pointer; text-decoration:none; color:inherit;">
            <div class="stat-icon"><script>document.write(window.Icons.health)</script></div>
            <div class="stat-label">录入健康数据</div>
          </a>
          <a href="/pages/visits.html" class="stat-card" style="cursor:pointer; text-decoration:none; color:inherit;">
            <div class="stat-icon"><script>document.write(window.Icons.visits)</script></div>
            <div class="stat-label">记录随访</div>
          </a>
        </div>
      </div>

      <div class="detail-panel">
        <h3><script>document.write(window.Icons.visits)</script> 最近活动</h3>
        <div id="recentActivity">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/icons.js"></script>
  <script src="../js/api.js"></script>
  <script>
    (function() {
      if (!api.requireAuth()) return;
      renderSidebar('dashboard');

      // 加载统计数据
      async function loadStats() {
        try {
          // 居民总数
          const residents = await api.get('/residents?page=1&size=1');
          if (residents.code === 200 && residents.data) {
            document.getElementById('statResidents').textContent = residents.data.total || 0;
          }

          // 社区数
          const communities = await api.get('/communities');
          if (communities.code === 200 && Array.isArray(communities.data)) {
            document.getElementById('statCommunities').textContent = communities.data.length;
          }

          // 慢性病类型数
          const diseases = await api.get('/diseases');
          if (diseases.code === 200 && Array.isArray(diseases.data)) {
            document.getElementById('statDiseases').textContent = diseases.data.length;
          }

          // 系统状态检测
          const health = await fetch('/api/v1/health-check').then(r => r.json());
          document.getElementById('statStatus').textContent =
            health.code === 200 ? '正常运行' : '异常';

        } catch (e) {
          console.error('加载统计数据失败:', e);
        }
      }

      async function loadRecentActivity() {
        const el = document.getElementById('recentActivity');
        try {
          // 尝试获取第一个居民的信息作为活动示例
          const residents = await api.get('/residents?page=1&size=5');
          if (residents.code === 200 && residents.data?.list?.length > 0) {
            let html = '<div style="display:flex;flex-direction:column;gap:12px;">';
            for (const r of residents.data.list) {
              html += `
                <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-color);">
                  <span style="display:flex;align-items:center;color:var(--accent-primary);width:24px;height:24px;">${window.Icons.residents}</span>
                  <div style="flex:1;">
                    <div style="font-size:0.9rem;">${r.name} — ${r.community_name || '未分配社区'}</div>
                    <div style="font-size:0.78rem;color:var(--text-muted);">建档时间: ${r.created_at || '未知'}</div>
                  </div>
                  <span class="badge badge-info">居民</span>
                </div>`;
            }
            html += '</div>';
            el.innerHTML = html;
          } else {
            el.innerHTML = '<div class="empty-state"><div class="icon">' + window.Icons.empty + '</div><h3>暂无活动记录</h3></div>';
          }
        } catch (e) {
          el.innerHTML = '<div class="empty-state"><div class="icon">' + window.Icons.error + '</div><h3>加载失败</h3></div>';
        }
      }

      loadStats();
      loadRecentActivity();
    })();
  </script>
</body>
</html>

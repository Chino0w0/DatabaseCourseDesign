<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="社区健康档案管理系统 - 用户管理">
  <title>用户管理 - 社区健康档案管理系统</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-header">
        <h1>用户管理</h1>
        <p>系统账号及工作权限管理（仅管理员可见）</p>
      </div>

      <div class="toolbar">
        <div class="search-input-wrapper">
          <script>if(window.Icons) document.write(window.Icons.search)</script>
          <input type="text" id="searchKeyword" class="search-input" placeholder="搜索用户名 / 角色">
        </div>
        <div class="spacer"></div>
        <button class="btn btn-primary btn-sm" onclick="openAddUser()">
          <script>if(window.Icons) document.write(window.Icons.plus)</script> 新增用户
        </button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>用户名</th>
              <th>角色</th>
              <th>创建时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="5"><div class="loading"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </main>
  </div>

  <!-- 新增/编辑用户 Modal -->
  <div class="modal-overlay" id="userModal">
    <div class="modal" style="max-width: 460px;">
      <div class="modal-header">
        <h3 id="userModalTitle">新增用户</h3>
        <button class="modal-close" onclick="closeUserModal()">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editUserId">
        <div class="form-group">
          <label>登录账号 (Username) <span class="required">*</span></label>
          <input type="text" id="uName" placeholder="登录账号名">
        </div>
        <div class="form-group">
          <label>真实姓名 (Real Name) <span class="required">*</span></label>
          <input type="text" id="uRealName" placeholder="真实姓名">
        </div>
        <div class="form-group">
          <label>联系电话 (Phone)</label>
          <input type="text" id="uPhone" placeholder="手机号">
        </div>
        <div class="form-group">
          <label>密码 (Password) <span class="required" id="pwdRequired">*</span></label>
          <input type="password" id="uPassword" placeholder="设置登录密码（编辑时留空不修改）">
        </div>
        <div class="form-group">
          <label>角色分配 (Role) <span class="required">*</span></label>
          <select id="uRole">
            <option value="2">医生 (Doctor)</option>
            <option value="3">护士 (Nurse)</option>
            <option value="1">系统管理员 (Admin)</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeUserModal()">取消</button>
        <button class="btn btn-primary" id="saveUserBtn" onclick="saveUser()">保存</button>
      </div>
    </div>
  </div>

  <script src="../js/icons.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/users.js"></script>
</body>
</html>
